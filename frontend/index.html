<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emotion-Aware Chatbot</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0f1115; color: #e8eaed;
         display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px 18px; font-weight: 600; border-bottom: 1px solid #23262e; }
  #emotion { padding: 10px 18px; border-bottom: 1px solid #23262e; background: #151821; min-height: 62px; }
  #emotion.hidden { display: none; }
  #emotion .big { font-size: 20px; text-transform: capitalize; }
  #emotion .pct { color: #8a92a6; font-size: 14px; }
  #emotion .sub { color: #8a92a6; font-size: 13px; margin-top: 2px; }
  #emotion .conflict { color: #ffb454; font-size: 13px; margin-top: 3px; }
  #chat { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 75%; padding: 9px 13px; border-radius: 14px; white-space: pre-wrap; }
  .bubble.user { align-self: flex-end; background: #2b6cff; color: #fff; border-bottom-right-radius: 4px; }
  .bubble.bot { align-self: flex-start; background: #1c2029; border-bottom-left-radius: 4px; }
  #composer { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-top: 1px solid #23262e; }
  #cam { width: 88px; height: 66px; object-fit: cover; border-radius: 8px; background: #000; }
  .nocam { width: 88px; height: 66px; display: flex; align-items: center; justify-content: center;
           font-size: 11px; text-align: center; color: #8a92a6; background: #1c2029; border-radius: 8px; }
  #msg { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1px solid #2b303b;
         background: #151821; color: #e8eaed; font-size: 15px; }
  #send { padding: 11px 18px; border: 0; border-radius: 10px; background: #2b6cff; color: #fff;
          font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
  <header>🫶 Multimodal Emotion-Aware Chatbot</header>
  <div id="emotion" class="hidden"></div>
  <div id="chat"></div>
  <div id="composer">
    <video id="cam" autoplay muted playsinline></video>
    <input id="msg" placeholder="Type how you feel…" autocomplete="off">
    <button id="send">Send</button>
  </div>
  <canvas id="grab" hidden></canvas>
<script>
  const chat = document.getElementById('chat');
  const emo  = document.getElementById('emotion');
  const msg  = document.getElementById('msg');
  const cam  = document.getElementById('cam');
  const grab = document.getElementById('grab');
  const history = [];
  const EMOJI = {anger:'😠', disgust:'🤢', fear:'😨', happy:'😊', sad:'😢', surprise:'😮', neutral:'😐'};

  navigator.mediaDevices?.getUserMedia({video: true})
    .then(s => cam.srcObject = s)
    .catch(() => cam.replaceWith(Object.assign(document.createElement('div'),
      {className: 'nocam', textContent: '📷 camera off — text only'})));

  function frame() {
    if (!cam.videoWidth) return null;                 // no webcam -> text only
    grab.width = cam.videoWidth; grab.height = cam.videoHeight;
    grab.getContext('2d').drawImage(cam, 0, 0);
    return grab.toDataURL('image/jpeg', 0.8);
  }
  function bubble(text, who) {
    const d = document.createElement('div');
    d.className = 'bubble ' + who; d.textContent = text;
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
    return d;
  }
  function pct(x) { return Math.round(x * 100) + '%'; }
  function showEmotion(r) {
    const f = r.fused_emotion, t = r.text_emotion, fa = r.face_emotion;
    emo.classList.remove('hidden');
    emo.innerHTML =
      `<div class="big">${EMOJI[f.label] || ''} ${f.label} <span class="pct">${pct(f.confidence)}</span></div>` +
      `<div class="sub">text: ${t.label} ${pct(t.confidence)} &nbsp;·&nbsp; ` +
      `face: ${fa.available ? fa.label + ' ' + pct(fa.confidence) : 'no face'}</div>` +
      (r.conflicted ? `<div class="conflict">⚠ your face and words seem to disagree</div>` : '');
  }
  async function send() {
    const text = msg.value.trim();
    if (!text) return;
    msg.value = '';
    bubble(text, 'user');
    const typing = bubble('…', 'bot');
    const f = frame();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text, frames: f ? [f] : [], history}),
      });
      const r = await res.json();
      typing.textContent = r.reply;
      history.push({role: 'user', content: text}, {role: 'assistant', content: r.reply});
      showEmotion(r);
    } catch (e) {
      typing.textContent = '⚠ error contacting server: ' + e;
    }
  }
  document.getElementById('send').onclick = send;
  msg.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
